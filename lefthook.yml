# Git hooks (managed by lefthook). Install with `bundle exec lefthook install`.
#
# pre-commit runs in parallel; any failing check aborts the commit:
#   - rubocop lints the staged .rb files
#   - trufflehog scans for verified secrets
#   - the full test suite (bin/test)
# trufflehog and bin/test are wrapped in `nix develop --command` because the
# hook fires outside the flake devshell, so trufflehog / bundler / scampi
# wouldn't otherwise be on PATH.
pre-commit:
  parallel: true
  commands:
    rubocop:
      glob: "*.rb"
      run: bundle exec rubocop --force-exclusion {staged_files}
    secrets:
      run: nix develop --command trufflehog git file://. --since-commit HEAD --only-verified --fail
    tests:
      run: nix develop --command bin/test
