title: ratalada
description: 'A DSL for running Rack servers as easily as you can in JavaScript. Pattern-match routes, pick a backend with a require, and run.'
url: https://n-at-han-k.github.io
baseurl: /ratalada
lang: en-US
locale: en_US
repository: n-at-han-k/ratalada
remote_theme: just-the-docs/just-the-docs

# Collections for organizing content
collections:
  getting_started:
    permalink: "/:name/"
    output: true
  guides:
    permalink: "/:name/"
    output: true
  examples:
    permalink: "/:name/"
    output: true

# Configure Just the Docs collections
just_the_docs:
  collections:
    getting_started:
      name: Start Here
      nav_fold: false
    guides:
      name: Guides
      nav_fold: false
    examples:
      name: Examples
      nav_fold: false

# Set default layout for collections
defaults:
  - scope:
      path: ""
      type: "getting_started"
    values:
      layout: "default"
      seo:
        type: "WebPage"
  - scope:
      path: ""
      type: "guides"
    values:
      layout: "default"
      seo:
        type: "WebPage"
  - scope:
      path: ""
      type: "examples"
    values:
      layout: "default"
      seo:
        type: "WebPage"

search_enabled: true
search:
  heading_level: 2
  previews: 3
  preview_words_before: 5
  preview_words_after: 10
  tokenizer_separator: /[\s/]+/
  rel_url: true
  button: false

nav_external_links:
  - title: GitHub
    url: https://github.com/n-at-han-k/ratalada
    hide_icon: false

last_edit_timestamp: true

enable_copy_code_button: true

heading_anchors: true

color_scheme: light

callouts:
  new:
    title: New
    color: green
  warning:
    title: Warning
    color: yellow
  note:
    title: Note
    color: blue

plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag
  - jekyll-sitemap

author:
  type: Person
  name: Nathan K
  links:
    - https://github.com/n-at-han-k/ratalada

# Jekyll uses Dart Sass; suppress deprecations emitted by upstream theme styles.
sass:
  quiet_deps: true
  silence_deprecations:
    - import
    - global-builtin
    - color-functions

exclude:
  - bin/
  - Gemfile
  - Gemfile.lock
  - vendor/
